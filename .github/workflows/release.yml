name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

jobs:
  # ──────────────────────────────────────────────────
  # Job 1: Create the GitHub Release (as a draft)
  # ──────────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ env.VERSION }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        run: echo "VERSION=${{ github.ref_name }}" >> $GITHUB_ENV

      - name: Verify tag matches Cargo.toml version
        shell: bash
        run: |
          CARGO_VERSION="${VERSION#v}"
          if ! grep -q "^version = \"${CARGO_VERSION}\"" Cargo.toml; then
            echo "ERROR: Tag ${VERSION} does not match version in Cargo.toml" >&2
            echo "Cargo.toml has: $(grep '^version' Cargo.toml)" >&2
            exit 1
          fi

      - name: Create draft GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$VERSION" \
            --draft \
            --verify-tag \
            --title "$VERSION" \
            --notes "Release $VERSION"

  # ──────────────────────────────────────────────────
  # Job 2: Build release binaries (matrix)
  # ──────────────────────────────────────────────────
  build-release:
    name: Build (${{ matrix.target }})
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            archive_suffix: .tar.gz

          - target: x86_64-apple-darwin
            os: macos-13
            archive_suffix: .tar.gz

          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use-cross: true
            archive_suffix: .tar.gz

          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            use-cross: true
            archive_suffix: .tar.gz

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive_suffix: .zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux musl only)
        if: matrix.use-cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Set build command
        shell: bash
        run: |
          if [[ "${{ matrix.use-cross }}" == "true" ]]; then
            echo "BUILD_CMD=cross" >> $GITHUB_ENV
          else
            echo "BUILD_CMD=cargo" >> $GITHUB_ENV
          fi

      - name: Build release binary
        shell: bash
        run: ${{ env.BUILD_CMD }} build --release --locked --target=${{ matrix.target }}

      - name: Determine binary name
        shell: bash
        run: |
          EXE_SUFFIX=""
          case "${{ matrix.target }}" in
            *-pc-windows-*) EXE_SUFFIX=".exe" ;;
          esac
          echo "BIN=target/${{ matrix.target }}/release/sb${EXE_SUFFIX}" >> $GITHUB_ENV

      - name: Strip binary (macOS/Linux)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: strip "${{ env.BIN }}" || true

      - name: Create release archive
        shell: bash
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          ARCHIVE_BASE="sb-${VERSION}-${{ matrix.target }}"

          mkdir -p "$ARCHIVE_BASE"
          cp "${{ env.BIN }}" "$ARCHIVE_BASE/"
          cp README.md LICENSE "$ARCHIVE_BASE/" 2>/dev/null || true

          case "${{ matrix.archive_suffix }}" in
            .tar.gz)
              tar czf "${ARCHIVE_BASE}.tar.gz" "$ARCHIVE_BASE"
              shasum -a 256 "${ARCHIVE_BASE}.tar.gz" > "${ARCHIVE_BASE}.tar.gz.sha256"
              echo "ASSET=${ARCHIVE_BASE}.tar.gz" >> $GITHUB_ENV
              echo "ASSET_SUM=${ARCHIVE_BASE}.tar.gz.sha256" >> $GITHUB_ENV
              ;;
            .zip)
              7z a "${ARCHIVE_BASE}.zip" "$ARCHIVE_BASE"
              certutil -hashfile "${ARCHIVE_BASE}.zip" SHA256 > "${ARCHIVE_BASE}.zip.sha256"
              echo "ASSET=${ARCHIVE_BASE}.zip" >> $GITHUB_ENV
              echo "ASSET_SUM=${ARCHIVE_BASE}.zip.sha256" >> $GITHUB_ENV
              ;;
          esac

      - name: Upload binary to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          gh release upload "$VERSION" "${{ env.ASSET }}" "${{ env.ASSET_SUM }}"

  # ──────────────────────────────────────────────────
  # Job 3: Publish npm packages
  # Depends on npm package structure from sidebar_tui-ff7u.
  # ──────────────────────────────────────────────────
  publish-npm:
    name: Publish npm packages
    needs: [create-release, build-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Download release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          mkdir -p dist
          gh release download "$VERSION" --dir dist

      - name: Set npm package versions and inject binaries
        shell: bash
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          # Strip leading 'v' for npm version (npm uses semver without 'v' prefix)
          NPM_VERSION="${VERSION#v}"

          # Map GitHub release asset names to npm package names
          declare -A PLATFORM_MAP=(
            ["sb-${VERSION}-aarch64-apple-darwin"]="sidebar-tui-darwin-arm64"
            ["sb-${VERSION}-x86_64-apple-darwin"]="sidebar-tui-darwin-x64"
            ["sb-${VERSION}-x86_64-unknown-linux-musl"]="sidebar-tui-linux-x64"
            ["sb-${VERSION}-aarch64-unknown-linux-musl"]="sidebar-tui-linux-arm64"
            ["sb-${VERSION}-x86_64-pc-windows-msvc"]="sidebar-tui-win32-x64"
          )

          for archive_base in "${!PLATFORM_MAP[@]}"; do
            pkg="${PLATFORM_MAP[$archive_base]}"
            pkg_dir="npm/$pkg"

            # Update package version
            node -e "
              const fs = require('fs');
              const p = JSON.parse(fs.readFileSync('${pkg_dir}/package.json', 'utf8'));
              p.version = '${NPM_VERSION}';
              fs.writeFileSync('${pkg_dir}/package.json', JSON.stringify(p, null, 2) + '\n');
            "

            # Copy binary (tar.gz or zip)
            if [ -f "dist/${archive_base}.tar.gz" ]; then
              tar xzf "dist/${archive_base}.tar.gz" -C dist/
              bin_src=$(find "dist/${archive_base}" -name "sb" -o -name "sb.exe" | head -1)
              if [ -n "$bin_src" ]; then
                cp "$bin_src" "${pkg_dir}/"
                chmod +x "${pkg_dir}/sb" 2>/dev/null || true
              fi
            elif [ -f "dist/${archive_base}.zip" ]; then
              unzip -q "dist/${archive_base}.zip" -d dist/
              bin_src=$(find "dist/${archive_base}" -name "sb.exe" | head -1)
              if [ -n "$bin_src" ]; then
                cp "$bin_src" "${pkg_dir}/"
              fi
            fi
          done

          # Update main package version and optionalDependencies versions
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('npm/sidebar-tui/package.json', 'utf8'));
            p.version = '${NPM_VERSION}';
            for (const dep of Object.keys(p.optionalDependencies || {})) {
              p.optionalDependencies[dep] = '${NPM_VERSION}';
            }
            fs.writeFileSync('npm/sidebar-tui/package.json', JSON.stringify(p, null, 2) + '\n');
          "

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for pkg_dir in npm/sidebar-tui-*; do
            [ -d "$pkg_dir" ] || continue
            echo "Publishing $pkg_dir..."
            npm publish "$pkg_dir" --access public
          done

      - name: Publish main package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish npm/sidebar-tui --access public

  # ──────────────────────────────────────────────────
  # Job 4: Publish (undraft) the release
  # ──────────────────────────────────────────────────
  publish-release:
    name: Publish GitHub Release
    needs: [create-release, build-release, publish-npm]
    runs-on: ubuntu-latest
    steps:
      - name: Undraft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          gh release edit "$VERSION" --draft=false --repo=${{ github.repository }}

  # ──────────────────────────────────────────────────
  # Job 5: Update Homebrew tap formula
  # Requires: HOMEBREW_TAP_GITHUB_TOKEN secret (PAT with repo+workflow scopes
  #   on the ftl-tools/homebrew-sidebar-tui tap repo)
  # ──────────────────────────────────────────────────
  publish-homebrew:
    name: Update Homebrew tap
    needs: [create-release, build-release, publish-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download release asset checksums
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          mkdir -p dist
          # Download only the .sha256 files (small, no need for full binaries)
          gh release download "$VERSION" --dir dist --pattern "*.sha256"

      - name: Generate Homebrew formula
        shell: bash
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"

          # Parse sha256 files (shasum -a 256 format: "<hash>  <filename>")
          MACOS_ARM64_SHA=$(awk '{print $1}' "dist/sb-${VERSION}-aarch64-apple-darwin.tar.gz.sha256")
          MACOS_X64_SHA=$(awk '{print $1}' "dist/sb-${VERSION}-x86_64-apple-darwin.tar.gz.sha256")
          LINUX_ARM64_SHA=$(awk '{print $1}' "dist/sb-${VERSION}-aarch64-unknown-linux-musl.tar.gz.sha256")
          LINUX_X64_SHA=$(awk '{print $1}' "dist/sb-${VERSION}-x86_64-unknown-linux-musl.tar.gz.sha256")

          # Strip leading 'v' for the version field
          VER="${VERSION#v}"
          REPO="https://github.com/${{ github.repository }}"

          cat > homebrew/Formula/sb.rb <<FORMULA
          class Sb < Formula
            desc "TUI for managing terminal sessions in a sidebar"
            homepage "${REPO}"
            version "${VER}"
            license "MIT"

            if OS.mac?
              if Hardware::CPU.arm?
                url "${REPO}/releases/download/${VERSION}/sb-${VERSION}-aarch64-apple-darwin.tar.gz"
                sha256 "${MACOS_ARM64_SHA}"
              end
              if Hardware::CPU.intel?
                url "${REPO}/releases/download/${VERSION}/sb-${VERSION}-x86_64-apple-darwin.tar.gz"
                sha256 "${MACOS_X64_SHA}"
              end
            end
            if OS.linux?
              if Hardware::CPU.arm?
                url "${REPO}/releases/download/${VERSION}/sb-${VERSION}-aarch64-unknown-linux-musl.tar.gz"
                sha256 "${LINUX_ARM64_SHA}"
              end
              if Hardware::CPU.intel?
                url "${REPO}/releases/download/${VERSION}/sb-${VERSION}-x86_64-unknown-linux-musl.tar.gz"
                sha256 "${LINUX_X64_SHA}"
              end
            end

            def install
              bin.install "sb"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/sb --version")
            end
          end
          FORMULA

      - name: Push formula to Homebrew tap repo
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          git clone "https://x-access-token:${HOMEBREW_TAP_GITHUB_TOKEN}@github.com/ftl-tools/homebrew-sidebar-tui.git" tap-repo
          mkdir -p tap-repo/Formula
          cp homebrew/Formula/sb.rb tap-repo/Formula/sb.rb

          cd tap-repo
          git add Formula/sb.rb
          if ! git diff --cached --quiet; then
            git commit -m "Update sb to ${VERSION}"
            git push
          fi

  # ──────────────────────────────────────────────────
  # Job 6: Publish AUR package
  # Requires: AUR_SSH_PRIVATE_KEY, AUR_USERNAME, AUR_EMAIL secrets
  # One-time setup: create AUR account, upload SSH public key,
  #   create 'sidebar-tui-bin' AUR package on first release.
  # ──────────────────────────────────────────────────
  publish-aur:
    name: Publish to AUR
    needs: [create-release, build-release, publish-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download release asset checksums
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          mkdir -p dist
          gh release download "$VERSION" --dir dist --pattern "*.sha256"

      - name: Generate PKGBUILD
        shell: bash
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          VER="${VERSION#v}"

          # Parse sha256 files (shasum -a 256 format: "<hash>  <filename>")
          LINUX_X64_SHA=$(awk '{print $1}' "dist/sb-${VERSION}-x86_64-unknown-linux-musl.tar.gz.sha256")
          LINUX_ARM64_SHA=$(awk '{print $1}' "dist/sb-${VERSION}-aarch64-unknown-linux-musl.tar.gz.sha256")

          REPO="https://github.com/${{ github.repository }}"

          cat > aur/PKGBUILD <<PKGBUILD
          # Maintainer: ftl-tools <${REPO}>
          # This file is automatically updated by the release workflow. Do not edit manually.

          pkgname=sidebar-tui-bin
          pkgver=${VER}
          pkgrel=1
          pkgdesc="TUI for managing terminal sessions in a sidebar"
          arch=('x86_64' 'aarch64')
          url="${REPO}"
          license=('MIT')
          provides=('sidebar-tui' 'sb')
          conflicts=('sidebar-tui')

          source_x86_64=("sb-${VERSION}-x86_64-unknown-linux-musl.tar.gz::${REPO}/releases/download/${VERSION}/sb-${VERSION}-x86_64-unknown-linux-musl.tar.gz")
          source_aarch64=("sb-${VERSION}-aarch64-unknown-linux-musl.tar.gz::${REPO}/releases/download/${VERSION}/sb-${VERSION}-aarch64-unknown-linux-musl.tar.gz")
          sha256sums_x86_64=('${LINUX_X64_SHA}')
          sha256sums_aarch64=('${LINUX_ARM64_SHA}')

          package() {
            cd "\${srcdir}/sb-${VERSION}-\${CARCH}-unknown-linux-musl"
            install -Dm755 "sb" "\$pkgdir/usr/bin/sb"
          }
          PKGBUILD

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v3.0.1
        with:
          pkgname: sidebar-tui-bin
          pkgbuild: ./aur/PKGBUILD
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ needs.create-release.outputs.version }}"
          force_push: 'true'
