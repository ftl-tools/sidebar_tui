<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Terminal window outline -->
  <rect x="2" y="6" width="44" height="36" rx="4" ry="4" stroke="#875fff" stroke-width="2.5" fill="none"/>
  <!-- Sidebar divider -->
  <line x1="16" y1="6" x2="16" y2="42" stroke="#875fff" stroke-width="2" opacity="0.6"/>
  <!-- Titlebar divider -->
  <line x1="2" y1="14" x2="16" y2="14" stroke="#875fff" stroke-width="1.5" opacity="0.4"/>
  <!-- Sidebar session lines -->
  <rect x="4" y="17" width="8" height="2" rx="1" fill="#875fff" opacity="0.9"/>
  <rect x="4" y="22" width="9" height="2" rx="1" fill="#875fff" opacity="0.5"/>
  <rect x="4" y="27" width="7" height="2" rx="1" fill="#875fff" opacity="0.5"/>
  <rect x="4" y="32" width="8" height="2" rx="1" fill="#875fff" opacity="0.5"/>
  <!-- Terminal prompt -->
  <rect x="19" y="17" width="3" height="2" rx="0.5" fill="#c084fc" opacity="0.8"/>
  <rect x="24" y="17" width="14" height="2" rx="1" fill="#875fff" opacity="0.6"/>
  <!-- Terminal output lines -->
  <rect x="19" y="22" width="20" height="1.5" rx="0.75" fill="#875fff" opacity="0.3"/>
  <rect x="19" y="26" width="16" height="1.5" rx="0.75" fill="#875fff" opacity="0.3"/>
</svg>
